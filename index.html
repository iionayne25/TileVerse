<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./styles/_color.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="form-container">
        <div class="">
          <label for="">Width<span class="asterisk">*</span>:</label>
          <input id="width" type="number" value="1" required />
        </div>
        <div class="">
          <label for="">Height<span class="asterisk">*</span>:</label>
          <input id="height" type="number" value="1" required />
        </div>
      </div>
      <div class="option-container">
        <div class="tile-container">
          <canvas class="tile-option active" data-tile="grass"></canvas>
          <canvas class="tile-option" data-tile="water"></canvas>
          <canvas class="tile-option" data-tile="soil"></canvas>
        </div>
        <div class="divider"></div>
        <div class="object-option-container">
          <canvas class="object-option active" data-object="ponyo"></canvas>
          <canvas class="object-option" data-object="dino"></canvas>
        </div>
      </div>
      <canvas id="canvas"> </canvas>
    </div>
    <script type="module" src="./main.js"></script>
    <script type="module" src="./constants/constant.js"></script>
    <script type="module" src="./component/dino.js"></script>
  </body>
</html>
